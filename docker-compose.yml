services:
  mariadb:
    image: mariadb:11
    container_name: erp_mariadb
    restart: unless-stopped

    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: erp
      MARIADB_USER: erp
      MARIADB_PASSWORD: erp_password

    ports:
      - "3307:3306"

    volumes:
      - mariadb_data:/var/lib/mysql

    # FIXED healthcheck (healthcheck.sh does NOT exist in mariadb image)
    healthcheck:
      test:
        [
          "CMD",
          "mariadb-admin",
          "ping",
          "-h",
          "127.0.0.1",
          "-uroot",
          "-prootpassword",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

    networks:
      - erp_net

  redis:
    image: redis:7-alpine
    container_name: erp_redis
    restart: unless-stopped

    command: ["redis-server", "--appendonly", "yes"]

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - erp_net

  adminer:
    image: adminer:latest
    container_name: erp_adminer
    restart: unless-stopped

    ports:
      - "8080:8080"

    depends_on:
      mariadb:
        condition: service_healthy

    networks:
      - erp_net

volumes:
  mariadb_data:
  redis_data:

networks:
  erp_net:
    driver: bridge
